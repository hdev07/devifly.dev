<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="55%" style="stop-color:#0b1120"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffb2"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="12%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="88%" cy="50%" r="42%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.13"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="78%" cy="20%" r="30%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>

  <!-- Grid sutil -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Línea superior brand -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

  <!-- Divisor vertical sutil -->
  <rect x="738" y="55" width="1" height="520" fill="url(#brandGrad)" opacity="0.12"/>

  <!-- ===== COLUMNA IZQUIERDA ===== -->

  <!-- Logo -->
  <rect x="80" y="58" width="46" height="46" rx="11" fill="url(#logoGrad)"/>
  <text x="103" y="89" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="24" fill="white" text-anchor="middle">D</text>
  <text x="139" y="89" font-family="Arial, sans-serif" font-weight="700" font-size="19" fill="#64748b">devifly.dev</text>

  <!-- Badge "Disponible" -->
  <rect x="80" y="140" width="228" height="30" rx="15" fill="#3b82f615" stroke="#3b82f635" stroke-width="1"/>
  <circle cx="100" cy="155" r="5" fill="#22d3ee"/>
  <text x="114" y="160" font-family="Arial, sans-serif" font-weight="500" font-size="12.5" fill="#94a3b8">Disponible para proyectos</text>

  <!-- Titular principal (3 líneas) -->
  <text x="80" y="232" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="56" fill="white">Productos digitales</text>
  <text x="80" y="298" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="56" fill="white">que generan clientes</text>
  <text x="80" y="364" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="56" fill="url(#titleGrad)">y escalan negocios.</text>

  <!-- Subtítulo -->
  <text x="80" y="412" font-family="Arial, sans-serif" font-weight="400" font-size="18" fill="#475569">Desde landing pages hasta plataformas SaaS completas.</text>
  <text x="80" y="438" font-family="Arial, sans-serif" font-weight="400" font-size="18" fill="#475569">Cotizacion personalizada en 24 horas, sin compromisos.</text>

  <!-- Servicios pills -->
  <rect x="80" y="475" width="152" height="32" rx="16" fill="#1e293b" stroke="#1d3a5f" stroke-width="1"/>
  <text x="156" y="496" font-family="Arial, sans-serif" font-weight="500" font-size="12.5" fill="#7dd3fc" text-anchor="middle">Landings</text>

  <rect x="244" y="475" width="152" height="32" rx="16" fill="#1e293b" stroke="#2d1b5e" stroke-width="1"/>
  <text x="320" y="496" font-family="Arial, sans-serif" font-weight="500" font-size="12.5" fill="#c4b5fd" text-anchor="middle">Invitaciones</text>

  <rect x="408" y="475" width="136" height="32" rx="16" fill="#1e293b" stroke="#3a2d08" stroke-width="1"/>
  <text x="476" y="496" font-family="Arial, sans-serif" font-weight="500" font-size="12.5" fill="#fcd34d" text-anchor="middle">Menus QR</text>

  <rect x="556" y="475" width="132" height="32" rx="16" fill="#1e293b" stroke="#0f3d3d" stroke-width="1"/>
  <text x="622" y="496" font-family="Arial, sans-serif" font-weight="500" font-size="12.5" fill="#6ee7b7" text-anchor="middle">SaaS / E-commerce</text>

  <!-- ===== COLUMNA DERECHA — tarjetas flotantes ===== -->

  <!-- Tarjeta 1: Landing Pages -->
  <g transform="translate(775, 68) rotate(-2.5)">
    <rect width="358" height="104" rx="16" fill="url(#cardBg)" stroke="#1e3a5f" stroke-width="1.5" opacity="0.95"/>
    <rect width="358" height="4" rx="2" fill="url(#brandGrad)"/>
    <text x="20" y="38" font-family="Arial, sans-serif" font-weight="700" font-size="14.5" fill="#7dd3fc">Landing Pages</text>
    <text x="20" y="62" font-family="Arial, sans-serif" font-weight="400" font-size="12.5" fill="#475569">Alta conversion · SEO optimizado · Velocidad</text>
    <text x="338" y="86" font-family="Arial, sans-serif" font-weight="700" font-size="17" fill="white" text-anchor="end">Desde $4,999 MXN</text>
  </g>

  <!-- Tarjeta 2: Invitaciones -->
  <g transform="translate(790, 200) rotate(1.5)">
    <rect width="346" height="100" rx="16" fill="url(#cardBg)" stroke="#2d1b5e" stroke-width="1.5" opacity="0.95"/>
    <rect width="346" height="4" rx="2" fill="#a78bfa"/>
    <text x="20" y="38" font-family="Arial, sans-serif" font-weight="700" font-size="14.5" fill="#c4b5fd">Invitaciones Digitales</text>
    <text x="20" y="62" font-family="Arial, sans-serif" font-weight="400" font-size="12.5" fill="#475569">Bodas · XV anos · Bautizos · Graduaciones</text>
    <text x="326" y="82" font-family="Arial, sans-serif" font-weight="700" font-size="17" fill="white" text-anchor="end">Desde $499 MXN</text>
  </g>

  <!-- Tarjeta 3: Menus -->
  <g transform="translate(780, 328) rotate(-1.5)">
    <rect width="350" height="100" rx="16" fill="url(#cardBg)" stroke="#3a2d08" stroke-width="1.5" opacity="0.95"/>
    <rect width="350" height="4" rx="2" fill="#d4af37"/>
    <text x="20" y="38" font-family="Arial, sans-serif" font-weight="700" font-size="14.5" fill="#fbbf24">Menus Digitales para Restaurantes</text>
    <text x="20" y="62" font-family="Arial, sans-serif" font-weight="400" font-size="12.5" fill="#475569">Carta QR · Fotos HD · Sin app · Multi-sucursal</text>
    <text x="330" y="82" font-family="Arial, sans-serif" font-weight="700" font-size="17" fill="white" text-anchor="end">Desde $3,999 MXN</text>
  </g>

  <!-- Tarjeta 4: Catalogos Nenis -->
  <g transform="translate(790, 454) rotate(2)">
    <rect width="340" height="100" rx="16" fill="url(#cardBg)" stroke="#5b1a4a" stroke-width="1.5" opacity="0.95"/>
    <rect width="340" height="4" rx="2" fill="#ec4899"/>
    <text x="20" y="38" font-family="Arial, sans-serif" font-weight="700" font-size="14.5" fill="#f472b6">Catalogos Digitales para Nenis</text>
    <text x="20" y="62" font-family="Arial, sans-serif" font-weight="400" font-size="12.5" fill="#475569">Stock · Tallas · Pedidos automaticos · WhatsApp</text>
    <text x="320" y="82" font-family="Arial, sans-serif" font-weight="700" font-size="17" fill="white" text-anchor="end">Desde $1,499 MXN</text>
  </g>

  <!-- URL inferior derecha -->
  <text x="1140" y="600" font-family="Arial, sans-serif" font-weight="700" font-size="17" fill="url(#brandGrad)" text-anchor="end">devifly.dev</text>

  <!-- Línea inferior accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentGrad)"/>
</svg>