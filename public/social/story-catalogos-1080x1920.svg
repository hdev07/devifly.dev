<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0810"/>
      <stop offset="100%" stop-color="#180a18"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="glowPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowFuchsia" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ctaPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f0f1f" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#0f080f" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="100"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="glowText">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1080" height="1920" fill="url(#bgGrad)"/>

  <!-- Glows -->
  <circle cx="200" cy="350" r="550" fill="url(#glowPink)" filter="url(#blur1)"/>
  <circle cx="900" cy="1600" r="500" fill="url(#glowFuchsia)" filter="url(#blur1)"/>
  <circle cx="540" cy="960" r="300" fill="#ec4899" fill-opacity="0.025" filter="url(#blur2)"/>

  <!-- Grid de puntos -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ec4899" fill-opacity="0.05"/>
  </pattern>
  <rect width="1080" height="1920" fill="url(#dots)"/>

  <!-- Ornamentos decorativos -->
  <circle cx="980" cy="100" r="140" fill="none" stroke="#ec4899" stroke-width="0.5" stroke-opacity="0.1"/>
  <circle cx="980" cy="100" r="100" fill="none" stroke="#d946ef" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="100" cy="1820" r="120" fill="none" stroke="#f472b6" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- === LOGO centrado === -->
  <g transform="translate(540, 120)">
    <rect x="-26" y="-26" width="52" height="52" rx="12" fill="url(#brandGrad)"/>
    <rect x="-26" y="-26" width="52" height="52" rx="12" fill="url(#brandGrad)" filter="url(#blur3)" opacity="0.6"/>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui" font-weight="700"
          font-size="26" fill="white">D</text>
  </g>
  <text x="540" y="205" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="600" font-size="28" fill="#fdf2f8">devifly<tspan fill="#60a5fa">.dev</tspan></text>

  <rect x="200" y="225" width="680" height="1" fill="url(#pinkGrad)" opacity="0.25"/>

  <!-- === Icono decorativo central === -->
  <g transform="translate(540, 370)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#ec4899" stroke-width="0.5" stroke-opacity="0.12"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#f472b6" stroke-width="0.8" stroke-opacity="0.2"/>
    <circle cx="0" cy="0" r="65" fill="#1f0f1f" fill-opacity="0.95" stroke="#ec4899" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="0" y="25" text-anchor="middle" font-size="55">🛍️</text>
  </g>

  <!-- === BADGE === -->
  <g transform="translate(540, 545)">
    <rect x="-165" y="-20" width="330" height="40" rx="20"
          fill="#1f0f1f" fill-opacity="0.95" stroke="#5b1a4a" stroke-width="1"/>
    <circle cx="-132" cy="0" r="6" fill="#f472b6"/>
    <text x="-115" y="6" font-family="'Inter', system-ui, sans-serif" font-size="17"
          fill="#b05080">Catálogos Digitales para Nenis</text>
  </g>

  <!-- === TÍTULO === -->
  <text x="540" y="660" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="80" fill="#fdf2f8" letter-spacing="-2">Comparte tu</text>
  <text x="540" y="752" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="80" fill="#fdf2f8" letter-spacing="-2">catálogo por</text>
  <text x="540" y="844" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="80" fill="url(#pinkGrad)"
        filter="url(#glowText)" letter-spacing="-2">WhatsApp</text>
  <text x="540" y="936" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="80" fill="url(#pinkGrad)"
        filter="url(#glowText)" letter-spacing="-2">y vende más. 💅</text>

  <!-- Subtítulo -->
  <text x="540" y="1012" text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif" font-size="27" fill="#7a3a5a">
    Sin apps · Sin complicaciones
  </text>

  <rect x="90" y="1060" width="900" height="1" fill="url(#pinkGrad)" opacity="0.2"/>

  <!-- === PLANES en columna === -->
  <g transform="translate(90, 1090)">
    <rect width="900" height="100" rx="16" fill="url(#cardGrad)" stroke="#5b1a4a" stroke-width="1"/>
    <text x="30" y="36" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="15" fill="#b05080">BÁSICO — Emprendedoras que inician</text>
    <text x="30" y="66" font-family="'Inter', system-ui, sans-serif"
          font-size="17" fill="#7a3a5a">Hasta 30 productos · Fotos · Precios · WhatsApp</text>
    <text x="860" y="62" text-anchor="end" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="30" fill="#fdf2f8">$1,499</text>
  </g>

  <!-- Completo (destacado) -->
  <g transform="translate(90, 1212)">
    <rect width="900" height="115" rx="16" fill="url(#cardGrad)" stroke="#ec4899" stroke-width="1.5"/>
    <rect x="20" y="-14" width="180" height="28" rx="14" fill="url(#ctaPink)"/>
    <text x="110" y="4" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="13" fill="white">💅 MÁS POPULAR</text>
    <text x="30" y="45" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="15" fill="#f472b6">COMPLETO — Nenis con volumen de ventas</text>
    <text x="30" y="72" font-family="'Inter', system-ui, sans-serif"
          font-size="17" fill="#7a3a5a">Stock · Tallas · Panel admin · Pedidos automáticos</text>
    <text x="860" y="78" text-anchor="end" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="34" fill="#f472b6">$3,499</text>
  </g>

  <!-- Premium -->
  <g transform="translate(90, 1350)">
    <rect width="900" height="100" rx="16" fill="url(#cardGrad)" stroke="#5b1a4a" stroke-width="1"/>
    <text x="30" y="36" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="15" fill="#d946ef">✨ PREMIUM — Tienda online completa</text>
    <text x="30" y="66" font-family="'Inter', system-ui, sans-serif"
          font-size="17" fill="#7a3a5a">Carrito + pagos en línea + dominio propio</text>
    <text x="860" y="62" text-anchor="end" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="30" fill="#fdf2f8">$6,999</text>
  </g>

  <rect x="90" y="1480" width="900" height="1" fill="url(#pinkGrad)" opacity="0.2"/>

  <!-- === FEATURES === -->
  <g transform="translate(540, 1545)">
    <text x="-410" y="0" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="600"
          font-size="26" fill="#fce7f3">📸  Productos con foto, precio y talla</text>
    <text x="-410" y="56" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="600"
          font-size="26" fill="#fce7f3">📦  Control de stock en tiempo real</text>
    <text x="-410" y="112" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="600"
          font-size="26" fill="#fce7f3">💬  Pedidos directo a tu WhatsApp</text>
    <text x="-410" y="168" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="600"
          font-size="26" fill="#fce7f3">🔗  Link para compartir en bio / stories</text>
  </g>

  <!-- === CTA === -->
  <g transform="translate(540, 1808)">
    <rect x="-265" y="-42" width="530" height="84" rx="42" fill="url(#ctaPink)"/>
    <rect x="-265" y="-42" width="530" height="84" rx="42" fill="url(#ctaPink)" filter="url(#blur3)" opacity="0.5"/>
    <text x="0" y="11" text-anchor="middle"
          font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="25" fill="white">🛍️ Quiero mi catálogo →</text>
  </g>

  <!-- URL footer -->
  <text x="540" y="1890" text-anchor="middle"
        font-family="'Inter', system-ui" font-size="22" fill="#5b1a4a" letter-spacing="1">devifly.dev/catalogos-nenis</text>

  <!-- Esquinas ornamentales -->
  <line x1="60" y1="1880" x2="160" y2="1880" stroke="#ec4899" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="60" y1="1880" x2="60" y2="1840" stroke="#ec4899" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="920" y1="1880" x2="1020" y2="1880" stroke="#d946ef" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="1020" y1="1880" x2="1020" y2="1840" stroke="#d946ef" stroke-width="2" stroke-opacity="0.35"/>
</svg>
