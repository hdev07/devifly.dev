<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Caja del logo -->
  <rect x="0" y="10" width="80" height="80" rx="18" fill="url(#brandGrad)"/>
  <!-- Glow sutil -->
  <rect x="0" y="10" width="80" height="80" rx="18" fill="url(#brandGrad)" filter="url(#glow)" opacity="0.5"/>

  <!-- Letra D -->
  <text x="40" y="63" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="44" fill="white">D</text>

  <!-- Nombre -->
  <text x="100" y="55" font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="48" fill="#f1f5f9">devifly</text>
  <text x="100" y="85" font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="400" font-size="28" fill="#60a5fa">.dev</text>
</svg>
