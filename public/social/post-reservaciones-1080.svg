<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0810"/>
      <stop offset="100%" stop-color="#180a18"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="glowGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34C759" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowEmerald" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#34C759" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ctaGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f0f1f" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#0f080f" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="80"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="glowText">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fondo oscuro -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>

  <!-- Glows -->
  <circle cx="150" cy="200" r="380" fill="url(#glowGreen)" filter="url(#blur1)"/>
  <circle cx="960" cy="880" r="330" fill="url(#glowEmerald)" filter="url(#blur1)"/>
  <circle cx="600" cy="540" r="200" fill="#34C759" fill-opacity="0.03" filter="url(#blur2)"/>

  <!-- Grid de puntos -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#34C759" fill-opacity="0.05"/>
  </pattern>
  <rect width="1080" height="1080" fill="url(#dots)"/>

  <!-- Formas decorativas de esquina -->
  <circle cx="1020" cy="60" r="130" fill="none" stroke="#34C759" stroke-width="0.6" stroke-opacity="0.1"/>
  <circle cx="1020" cy="60" r="85" fill="none" stroke="#4ade80" stroke-width="0.6" stroke-opacity="0.15"/>
  <circle cx="60" cy="1020" r="100" fill="none" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- === LOGO top-left === -->
  <g transform="translate(60, 55)">
    <rect width="44" height="44" rx="10" fill="url(#brandGrad)"/>
    <rect width="44" height="44" rx="10" fill="url(#brandGrad)" filter="url(#blur2)" opacity="0.5"/>
    <text x="22" y="30" text-anchor="middle" font-family="system-ui" font-weight="700"
          font-size="22" fill="white">D</text>
    <text x="56" y="20" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="600"
          font-size="22" fill="#f1f5f9">devifly</text>
    <text x="56" y="42" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="400"
          font-size="15" fill="#fb923c">.dev</text>
  </g>

  <!-- === BADGE === -->
  <g transform="translate(540, 222)">
    <rect x="-150" y="-18" width="300" height="36" rx="18"
          fill="#1f0f1f" fill-opacity="0.9" stroke="#1f2937" stroke-width="1"/>
    <circle cx="-118" cy="0" r="5" fill="#34C759"/>
    <text x="-103" y="5" font-family="'Inter', system-ui, sans-serif" font-size="15"
          fill="#4ade80">Sistema de Reservaciones</text>
  </g>

  <!-- === Icono central === -->
  <g transform="translate(540, 185)">
    <circle cx="0" cy="0" r="54" fill="#1f0f1f" fill-opacity="0.95" stroke="#34C759" stroke-width="1.2" stroke-opacity="0.5"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.25"/>
    <text x="0" y="18" text-anchor="middle" font-size="42">📅</text>
  </g>

  <!-- === TÍTULO === -->
  <text x="540" y="348" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="66" fill="#fdf2f8" letter-spacing="-1">Gestiona tus</text>
  <text x="540" y="428" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="66" fill="url(#greenGrad)"
        filter="url(#glowText)" letter-spacing="-1">reservas</text>
  <text x="540" y="504" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="56" fill="#fdf2f8" letter-spacing="-1">en línea con</text>
  <text x="540" y="572" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="56" fill="url(#greenGrad)"
        filter="url(#glowText)" letter-spacing="-1">facilidad. 🗓️</text>

  <!-- === CARDS de beneficios === -->
  <g transform="translate(90, 625)">
    <rect width="260" height="130" rx="16" fill="url(#cardGrad)" stroke="#1f2937" stroke-width="1" stroke-opacity="0.8"/>
    <text x="30" y="52" font-size="30">📱</text>
    <text x="30" y="82" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="17" fill="#fdf2f8">Reservas 24/7</text>
    <text x="30" y="104" font-family="'Inter', system-ui, sans-serif"
          font-size="13" fill="#4b5563">Disponible todo el tiempo</text>
  </g>
  <g transform="translate(410, 625)">
    <rect width="260" height="130" rx="16" fill="url(#cardGrad)" stroke="#1f2937" stroke-width="1" stroke-opacity="0.8"/>
    <text x="30" y="52" font-size="30">📅</text>
    <text x="30" y="82" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="17" fill="#fdf2f8">Calendario integrado</text>
    <text x="30" y="104" font-family="'Inter', system-ui, sans-serif"
          font-size="13" fill="#4b5563">Visualiza y administra fechas</text>
  </g>
  <g transform="translate(730, 625)">
    <rect width="260" height="130" rx="16" fill="url(#cardGrad)" stroke="#1f2937" stroke-width="1" stroke-opacity="0.8"/>
    <text x="30" y="52" font-size="30">✅</text>
    <text x="30" y="82" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="17" fill="#fdf2f8">Confirmaciones auto</text>
    <text x="30" y="104" font-family="'Inter', system-ui, sans-serif"
          font-size="13" fill="#4b5563">Respuestas instantáneas</text>
  </g>

  <!-- === Planes row === -->
  <g transform="translate(90, 800)">
    <rect width="265" height="75" rx="12" fill="url(#cardGrad)" stroke="#1f2937" stroke-width="1"/>
    <text x="20" y="28" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="14" fill="#4ade80">BÁSICO</text>
    <text x="20" y="55" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="26" fill="#fdf2f8">$2,499</text>
    <text x="200" y="55" font-family="'Inter', system-ui, sans-serif"
          font-size="12" fill="#4b5563">pago único</text>
  </g>
  <g transform="translate(413, 788)">
    <rect width="265" height="90" rx="12" fill="url(#cardGrad)" stroke="#34C759" stroke-width="1.5"/>
    <rect x="55" y="-13" width="155" height="26" rx="13" fill="url(#ctaGreen)"/>
    <text x="132" y="4" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="12" fill="white">🌿 MÁS POPULAR</text>
    <text x="20" y="40" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="14" fill="#4ade80">COMPLETO</text>
    <text x="20" y="68" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="26" fill="#fdf2f8">$4,999</text>
    <text x="200" y="68" font-family="'Inter', system-ui, sans-serif"
          font-size="12" fill="#4b5563">pago único</text>
  </g>
  <g transform="translate(735, 800)">
    <rect width="265" height="75" rx="12" fill="url(#cardGrad)" stroke="#1f2937" stroke-width="1"/>
    <text x="20" y="28" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="14" fill="#34C759">PREMIUM</text>
    <text x="20" y="55" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="26" fill="#fdf2f8">$7,499</text>
    <text x="200" y="55" font-family="'Inter', system-ui, sans-serif"
          font-size="12" fill="#4b5563">pago único</text>
  </g>
</svg>