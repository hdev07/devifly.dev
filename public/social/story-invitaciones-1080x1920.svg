<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0818"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="violetGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="roseGlow" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b30" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#15102b" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="100"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="glowText">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1080" height="1920" fill="url(#bgGrad)"/>

  <!-- Glows -->
  <circle cx="900" cy="300" r="550" fill="url(#violetGlow)" filter="url(#blur1)"/>
  <circle cx="150" cy="1600" r="500" fill="url(#roseGlow)" filter="url(#blur1)"/>
  <circle cx="400" cy="960" r="350" fill="#22d3ee" fill-opacity="0.03" filter="url(#blur2)"/>

  <!-- Grid de puntos -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" fill-opacity="0.04"/>
  </pattern>
  <rect width="1080" height="1920" fill="url(#dots)"/>

  <!-- === LOGO centrado === -->
  <g transform="translate(540, 120)">
    <rect x="-26" y="-26" width="52" height="52" rx="12" fill="url(#brandGrad)"/>
    <rect x="-26" y="-26" width="52" height="52" rx="12" fill="url(#brandGrad)" filter="url(#blur3)" opacity="0.6"/>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui" font-weight="700"
          font-size="26" fill="white">D</text>
  </g>
  <text x="540" y="205" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="600" font-size="28" fill="#f1f5f9">devifly<tspan fill="#a78bfa">.dev</tspan></text>

  <rect x="200" y="225" width="680" height="1" fill="url(#brandGrad)" opacity="0.2"/>

  <!-- === Icono central decorativo (anillos, flores) === -->
  <g transform="translate(540, 360)">
    <!-- Anillos externos decorativos -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="url(#brandGrad)" stroke-width="0.5" stroke-opacity="0.2"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
    <circle cx="0" cy="0" r="65" fill="#1e1b30" fill-opacity="0.9" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.5"/>
    <!-- Emoji central -->
    <text x="0" y="25" text-anchor="middle" font-size="60">💍</text>
  </g>

  <!-- === BADGE === -->
  <g transform="translate(540, 540)">
    <rect x="-145" y="-20" width="290" height="40" rx="20"
          fill="#1e1b30" fill-opacity="0.9" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="-112" cy="0" r="6" fill="#a78bfa"/>
    <text x="-95" y="6" font-family="'Inter', system-ui, sans-serif" font-size="17"
          fill="#9ca3af">Invitaciones Digitales Premium</text>
  </g>

  <!-- === TÍTULO === -->
  <text x="540" y="660" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="85" fill="#f1f5f9" letter-spacing="-2">Celebra cada</text>
  <text x="540" y="755" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="85" fill="#f1f5f9" letter-spacing="-2">momento con</text>
  <text x="540" y="850" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="85" fill="url(#brandGrad)"
        filter="url(#glowText)" letter-spacing="-2">una invitación</text>
  <text x="540" y="945" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="85" fill="url(#brandGrad)"
        filter="url(#glowText)" letter-spacing="-2">única.</text>

  <!-- Subtítulo -->
  <text x="540" y="1025" text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif" font-size="28" fill="#9ca3af">Bodas · XV años · Bautizos</text>
  <text x="540" y="1060" text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif" font-size="28" fill="#9ca3af">Graduaciones · Cumpleaños</text>

  <!-- Línea divisora -->
  <rect x="90" y="1110" width="900" height="1" fill="url(#brandGrad)" opacity="0.2"/>

  <!-- === 3 Planes en columna === -->
  <!-- Plan 1: Esencial -->
  <g transform="translate(90, 1140)">
    <rect width="900" height="100" rx="16" fill="url(#cardGrad)" stroke="#2d1f5e" stroke-width="1"/>
    <text x="30" y="38" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="16" fill="#9ca3af">ESENCIAL</text>
    <text x="30" y="68" font-family="'Inter', system-ui, sans-serif"
          font-size="18" fill="#6b7280">Diseño elegante · Cuenta regresiva · RSVP</text>
    <text x="860" y="65" text-anchor="end" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="32" fill="#e5e7eb">$499</text>
  </g>

  <!-- Plan 2: Pro (destacado) -->
  <g transform="translate(90, 1265)">
    <rect width="900" height="110" rx="16" fill="url(#cardGrad)" stroke="#a78bfa" stroke-width="1.5"/>
    <!-- Estrella popular -->
    <text x="30" y="38" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="16" fill="#a78bfa">⭐ PRO — MÁS POPULAR</text>
    <text x="30" y="68" font-family="'Inter', system-ui, sans-serif"
          font-size="18" fill="#6b7280">Música · Galería · Mapa · Mesa de regalos</text>
    <text x="860" y="75" text-anchor="end" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="36" fill="#a78bfa">$899</text>
  </g>

  <!-- Plan 3: Premium -->
  <g transform="translate(90, 1400)">
    <rect width="900" height="100" rx="16" fill="url(#cardGrad)" stroke="#2d1f5e" stroke-width="1"/>
    <text x="30" y="38" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="16" fill="#fbbf24">✨ PREMIUM</text>
    <text x="30" y="68" font-family="'Inter', system-ui, sans-serif"
          font-size="18" fill="#6b7280">Todo Pro + Animaciones + Diseño 100% a medida</text>
    <text x="860" y="65" text-anchor="end" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="32" fill="#e5e7eb">$1,599</text>
  </g>

  <!-- Línea divisora 2 -->
  <rect x="90" y="1530" width="900" height="1" fill="url(#brandGrad)" opacity="0.2"/>

  <!-- === FEATURES === -->
  <g transform="translate(540, 1590)">
    <text x="-400" y="0" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="600"
          font-size="26" fill="#e5e7eb">💌  Envío por link · sin apps</text>
    <text x="-400" y="55" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="600"
          font-size="26" fill="#e5e7eb">📊  Panel RSVP en tiempo real</text>
    <text x="-400" y="110" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="600"
          font-size="26" fill="#e5e7eb">🎵  Música de fondo personalizada</text>
    <text x="-400" y="165" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="600"
          font-size="26" fill="#e5e7eb">⚡  Lista en 3–5 días hábiles</text>
  </g>

  <!-- === CTA Button === -->
  <g transform="translate(540, 1810)">
    <rect x="-260" y="-40" width="520" height="80" rx="40" fill="url(#ctaGrad)"/>
    <rect x="-260" y="-40" width="520" height="80" rx="40" fill="url(#ctaGrad)" filter="url(#blur3)" opacity="0.5"/>
    <text x="0" y="10" text-anchor="middle"
          font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="26" fill="white">💌 Ver demo ahora →</text>
  </g>

  <!-- URL footer -->
  <text x="540" y="1890" text-anchor="middle"
        font-family="'Inter', system-ui" font-size="22" fill="#475569" letter-spacing="1">devifly.dev/invitaciones</text>

  <!-- Esquinas -->
  <line x1="60" y1="1880" x2="160" y2="1880" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="60" y1="1880" x2="60" y2="1840" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="920" y1="1880" x2="1020" y2="1880" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="1020" y1="1880" x2="1020" y2="1840" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.4"/>
</svg>
