<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0810"/>
      <stop offset="100%" stop-color="#180a18"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#FF383C"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="glowRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF383C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f87171" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowCrimson" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f87171" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF383C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ctaRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF383C"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f0f1f" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#0f080f" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="100"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="glowText">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1080" height="1920" fill="url(#bgGrad)"/>

  <!-- Glows -->
  <circle cx="200" cy="350" r="550" fill="url(#glowRed)" filter="url(#blur1)"/>
  <circle cx="900" cy="1600" r="500" fill="url(#glowCrimson)" filter="url(#blur1)"/>
  <circle cx="540" cy="960" r="300" fill="#FF383C" fill-opacity="0.025" filter="url(#blur2)"/>

  <!-- Grid de puntos -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#FF383C" fill-opacity="0.05"/>
  </pattern>
  <rect width="1080" height="1920" fill="url(#dots)"/>

  <!-- Ornamentos decorativos -->
  <circle cx="980" cy="100" r="140" fill="none" stroke="#FF383C" stroke-width="0.5" stroke-opacity="0.1"/>
  <circle cx="980" cy="100" r="100" fill="none" stroke="#f87171" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="100" cy="1820" r="120" fill="none" stroke="#dc2626" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- === LOGO centrado === -->
  <g transform="translate(540, 120)">
    <rect x="-26" y="-26" width="52" height="52" rx="12" fill="url(#brandGrad)"/>
    <rect x="-26" y="-26" width="52" height="52" rx="12" fill="url(#brandGrad)" filter="url(#blur3)" opacity="0.6"/>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui" font-weight="700"
          font-size="26" fill="white">D</text>
  </g>
  <text x="540" y="205" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="600" font-size="28" fill="#fdf2f8">devifly<tspan fill="#fb923c">.dev</tspan></text>

  <rect x="200" y="225" width="680" height="1" fill="url(#redGrad)" opacity="0.25"/>

  <!-- === Icono decorativo central === -->
  <g transform="translate(540, 370)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#FF383C" stroke-width="0.5" stroke-opacity="0.12"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#f87171" stroke-width="0.8" stroke-opacity="0.2"/>
    <circle cx="0" cy="0" r="65" fill="#1f0f1f" fill-opacity="0.95" stroke="#FF383C" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="0" y="25" text-anchor="middle" font-size="55">🔧</text>
  </g>

  <!-- === BADGE === -->
  <g transform="translate(540, 545)">
    <rect x="-140" y="-20" width="280" height="40" rx="20"
          fill="#1f0f1f" fill-opacity="0.95" stroke="#1f2937" stroke-width="1"/>
    <circle cx="-132" cy="0" r="6" fill="#FF383C"/>
    <text x="-90" y="6" font-family="'Inter', system-ui, sans-serif" font-size="17"
          fill="#fca5a5">Soporte y Mantenimiento</text>
  </g>

  <!-- === TÍTULO === -->
  <text x="540" y="660" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="80" fill="#fdf2f8" letter-spacing="-2">Tu sitio siempre</text>
  <text x="540" y="752" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="80" fill="#fdf2f8" letter-spacing="-2">actualizado y</text>
  <text x="540" y="844" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="80" fill="url(#redGrad)"
        filter="url(#glowText)" letter-spacing="-2">seguro</text>
  <text x="540" y="936" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="60" fill="#fdf2f8" letter-spacing="-1">con nuestro soporte</text>

  <!-- === BENEFICIOS === -->
  <g transform="translate(100, 1050)">
    <circle cx="40" cy="40" r="35" fill="#1f0f1f" fill-opacity="0.9" stroke="#FF383C" stroke-width="1"/>
    <text x="40" y="55" text-anchor="middle" font-size="35">🔄</text>
    <text x="90" y="35" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="24" fill="#fdf2f8">Actualizaciones</text>
    <text x="90" y="60" font-family="'Inter', system-ui, sans-serif"
          font-size="16" fill="#4b5563">Mantén tu sitio moderno</text>
  </g>
  <g transform="translate(100, 1150)">
    <circle cx="40" cy="40" r="35" fill="#1f0f1f" fill-opacity="0.9" stroke="#FF383C" stroke-width="1"/>
    <text x="40" y="55" text-anchor="middle" font-size="35">🛡️</text>
    <text x="90" y="35" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="24" fill="#fdf2f8">Seguridad</text>
    <text x="90" y="60" font-family="'Inter', system-ui, sans-serif"
          font-size="16" fill="#4b5563">Protege tus datos</text>
  </g>
  <g transform="translate(100, 1250)">
    <circle cx="40" cy="40" r="35" fill="#1f0f1f" fill-opacity="0.9" stroke="#FF383C" stroke-width="1"/>
    <text x="40" y="55" text-anchor="middle" font-size="35">📞</text>
    <text x="90" y="35" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="24" fill="#fdf2f8">Soporte 24/7</text>
    <text x="90" y="60" font-family="'Inter', system-ui, sans-serif"
          font-size="16" fill="#4b5563">Ayuda cuando la necesitas</text>
  </g>

  <!-- === CTA === -->
  <g transform="translate(540, 1450)">
    <rect x="-200" y="-30" width="400" height="60" rx="30" fill="url(#ctaRed)"/>
    <text x="0" y="10" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="24" fill="white">¡Contrata mantenimiento!</text>
  </g>

  <!-- === PLANES === -->
  <g transform="translate(100, 1550)">
    <rect width="320" height="80" rx="16" fill="url(#cardGrad)" stroke="#1f2937" stroke-width="1"/>
    <text x="20" y="30" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="16" fill="#FF383C">PLAN MENSUAL</text>
    <text x="20" y="55" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="28" fill="#fdf2f8">$499</text>
    <text x="250" y="55" font-family="'Inter', system-ui, sans-serif"
          font-size="12" fill="#4b5563">/mes</text>
  </g>
  <g transform="translate(460, 1530)">
    <rect width="320" height="100" rx="16" fill="url(#cardGrad)" stroke="#FF383C" stroke-width="1.5"/>
    <rect x="80" y="-15" width="160" height="30" rx="15" fill="url(#ctaRed)"/>
    <text x="160" y="5" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="14" fill="white">POPULAR</text>
    <text x="20" y="45" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="16" fill="#f87171">PLAN TRIMESTRAL</text>
    <text x="20" y="75" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="28" fill="#fdf2f8">$1,299</text>
    <text x="250" y="75" font-family="'Inter', system-ui, sans-serif"
          font-size="12" fill="#4b5563">/3 meses</text>
  </g>
</svg>