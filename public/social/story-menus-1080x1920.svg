<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d060"/>
      <stop offset="100%" stop-color="#c4a030"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="glowGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c4a030" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowGold2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f5d060" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ctaGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4a030"/>
      <stop offset="100%" stop-color="#f5d060"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1a12" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#0f0d08" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="100"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="glowText">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1080" height="1920" fill="url(#bgGrad)"/>

  <!-- Glows -->
  <circle cx="200" cy="380" r="500" fill="url(#glowGold)" filter="url(#blur1)"/>
  <circle cx="900" cy="1550" r="450" fill="url(#glowGold2)" filter="url(#blur1)"/>
  <circle cx="540" cy="960" r="300" fill="#d4af37" fill-opacity="0.02" filter="url(#blur2)"/>

  <!-- Grid de puntos dorado -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#d4af37" fill-opacity="0.04"/>
  </pattern>
  <rect width="1080" height="1920" fill="url(#dots)"/>

  <!-- Ornamentos circulares decorativos -->
  <circle cx="950" cy="120" r="140" fill="none" stroke="#d4af37" stroke-width="0.5" stroke-opacity="0.1"/>
  <circle cx="950" cy="120" r="100" fill="none" stroke="#d4af37" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="130" cy="1800" r="140" fill="none" stroke="#d4af37" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- === LOGO centrado === -->
  <g transform="translate(540, 120)">
    <rect x="-26" y="-26" width="52" height="52" rx="12" fill="url(#brandGrad)"/>
    <rect x="-26" y="-26" width="52" height="52" rx="12" fill="url(#brandGrad)" filter="url(#blur3)" opacity="0.6"/>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui" font-weight="700"
          font-size="26" fill="white">D</text>
  </g>
  <text x="540" y="205" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="600" font-size="28" fill="#f5f0e8">devifly<tspan fill="#60a5fa">.dev</tspan></text>

  <rect x="200" y="225" width="680" height="1" fill="url(#goldGrad)" opacity="0.25"/>

  <!-- === Icono QR / restaurante decorativo === -->
  <g transform="translate(540, 370)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#d4af37" stroke-width="0.5" stroke-opacity="0.15"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#d4af37" stroke-width="0.8" stroke-opacity="0.25"/>
    <circle cx="0" cy="0" r="65" fill="#1e1a12" fill-opacity="0.95" stroke="#d4af37" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="0" y="25" text-anchor="middle" font-size="58">🍽️</text>
  </g>

  <!-- === Badge === -->
  <g transform="translate(540, 545)">
    <rect x="-145" y="-20" width="290" height="40" rx="20"
          fill="#1e1a12" fill-opacity="0.95" stroke="#3d2f0a" stroke-width="1"/>
    <circle cx="-112" cy="0" r="6" fill="#d4af37"/>
    <text x="-95" y="6" font-family="'Inter', system-ui, sans-serif" font-size="17"
          fill="#a08030">Menús Digitales QR</text>
  </g>

  <!-- === TÍTULO === -->
  <text x="540" y="665" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="82" fill="#f5f0e8" letter-spacing="-2">Tu carta</text>
  <text x="540" y="758" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="82" fill="#f5f0e8" letter-spacing="-2">siempre</text>
  <text x="540" y="851" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="82" fill="url(#goldGrad)"
        filter="url(#glowText)" letter-spacing="-2">actualizada,</text>
  <text x="540" y="944" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="82" fill="url(#goldGrad)"
        filter="url(#glowText)" letter-spacing="-2">sin papel.</text>

  <!-- Subtítulo -->
  <text x="540" y="1020" text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif" font-size="27" fill="#7a6a40">
    Escanean · Ven · Piden. Así de fácil.
  </text>

  <!-- Línea divisora -->
  <rect x="90" y="1070" width="900" height="1" fill="url(#goldGrad)" opacity="0.25"/>

  <!-- === PLANES en columna === -->
  <!-- Esencial -->
  <g transform="translate(90, 1100)">
    <rect width="900" height="100" rx="16" fill="url(#cardGrad)" stroke="#3d2f0a" stroke-width="1"/>
    <text x="30" y="36" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="15" fill="#a08030">ESENCIAL — Food truck · Pequeño restaurante</text>
    <text x="30" y="66" font-family="'Inter', system-ui, sans-serif"
          font-size="17" fill="#7a6a40">QR + carta digital · hasta 50 productos</text>
    <text x="860" y="62" text-anchor="end" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="30" fill="#f5f0e8">$3,999</text>
  </g>

  <!-- Profesional (destacado) -->
  <g transform="translate(90, 1222)">
    <rect width="900" height="115" rx="16" fill="url(#cardGrad)" stroke="#d4af37" stroke-width="1.5"/>
    <rect x="20" y="-14" width="180" height="28" rx="14" fill="url(#ctaGold)"/>
    <text x="110" y="4" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="13" fill="#0a0800">⭐ MÁS POPULAR</text>
    <text x="30" y="45" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="15" fill="#d4af37">PROFESIONAL — Restaurante mediano</text>
    <text x="30" y="72" font-family="'Inter', system-ui, sans-serif"
          font-size="17" fill="#7a6a40">Categorías · Fotos HD · Panel de administración</text>
    <text x="860" y="78" text-anchor="end" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="34" fill="#d4af37">$7,999</text>
  </g>

  <!-- Empresarial -->
  <g transform="translate(90, 1360)">
    <rect width="900" height="100" rx="16" fill="url(#cardGrad)" stroke="#3d2f0a" stroke-width="1"/>
    <text x="30" y="36" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="15" fill="#f5d060">✨ EMPRESARIAL — Cadenas · Multi-sucursal</text>
    <text x="30" y="66" font-family="'Inter', system-ui, sans-serif"
          font-size="17" fill="#7a6a40">Múltiples cartas · Usuarios · Analíticas</text>
    <text x="860" y="62" text-anchor="end" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="30" fill="#f5f0e8">$14,999</text>
  </g>

  <!-- Línea divisora 2 -->
  <rect x="90" y="1490" width="900" height="1" fill="url(#goldGrad)" opacity="0.2"/>

  <!-- === FEATURES === -->
  <g transform="translate(540, 1555)">
    <text x="-410" y="0" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="600"
          font-size="26" fill="#e8d898">✅  Sin apps · Solo escanea el QR</text>
    <text x="-410" y="56" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="600"
          font-size="26" fill="#e8d898">✅  Actualiza precios al instante</text>
    <text x="-410" y="112" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="600"
          font-size="26" fill="#e8d898">✅  Diseño elegante con tu logo</text>
    <text x="-410" y="168" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="600"
          font-size="26" fill="#e8d898">✅  Listo en 5 días hábiles</text>
  </g>

  <!-- === CTA === -->
  <g transform="translate(540, 1805)">
    <rect x="-250" y="-40" width="500" height="80" rx="40" fill="url(#ctaGold)"/>
    <rect x="-250" y="-40" width="500" height="80" rx="40" fill="url(#ctaGold)" filter="url(#blur3)" opacity="0.4"/>
    <text x="0" y="10" text-anchor="middle"
          font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="25" fill="#0a0800">🍽️ Ver demo de menú →</text>
  </g>

  <!-- URL footer -->
  <text x="540" y="1890" text-anchor="middle"
        font-family="'Inter', system-ui" font-size="22" fill="#3d2f0a" letter-spacing="1">devifly.dev/menus-digitales</text>

  <!-- Esquinas ornamentales -->
  <line x1="60" y1="1880" x2="160" y2="1880" stroke="#d4af37" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="60" y1="1880" x2="60" y2="1840" stroke="#d4af37" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="920" y1="1880" x2="1020" y2="1880" stroke="#d4af37" stroke-width="2" stroke-opacity="0.35"/>
  <line x1="1020" y1="1880" x2="1020" y2="1840" stroke="#d4af37" stroke-width="2" stroke-opacity="0.35"/>
</svg>
