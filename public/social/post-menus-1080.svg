<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d060"/>
      <stop offset="100%" stop-color="#c4a030"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="glowGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c4a030" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowGold2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f5d060" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ctaGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4a030"/>
      <stop offset="100%" stop-color="#f5d060"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1a12" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#0f0d08" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="80"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="glowText">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fondo cálido oscuro -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>

  <!-- Glows dorados -->
  <circle cx="180" cy="220" r="380" fill="url(#glowGold)" filter="url(#blur1)"/>
  <circle cx="950" cy="870" r="320" fill="url(#glowGold2)" filter="url(#blur1)"/>
  <circle cx="600" cy="540" r="200" fill="#d4af37" fill-opacity="0.03" filter="url(#blur2)"/>

  <!-- Grid de puntos sutil -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#d4af37" fill-opacity="0.04"/>
  </pattern>
  <rect width="1080" height="1080" fill="url(#dots)"/>

  <!-- Ornamento de esquina superior derecha -->
  <circle cx="1000" cy="80" r="120" fill="none" stroke="#d4af37" stroke-width="0.6" stroke-opacity="0.12"/>
  <circle cx="1000" cy="80" r="80" fill="none" stroke="#d4af37" stroke-width="0.6" stroke-opacity="0.18"/>

  <!-- === LOGO top-left === -->
  <g transform="translate(60, 55)">
    <rect width="44" height="44" rx="10" fill="url(#brandGrad)"/>
    <rect width="44" height="44" rx="10" fill="url(#brandGrad)" filter="url(#blur2)" opacity="0.5"/>
    <text x="22" y="30" text-anchor="middle" font-family="system-ui" font-weight="700"
          font-size="22" fill="white">D</text>
    <text x="56" y="20" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="600"
          font-size="22" fill="#f1f5f9">devifly</text>
    <text x="56" y="42" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="400"
          font-size="15" fill="#60a5fa">.dev</text>
  </g>

  <!-- === Badge === -->
  <g transform="translate(540, 222)">
    <rect x="-130" y="-18" width="260" height="36" rx="18"
          fill="#1e1a12" fill-opacity="0.9" stroke="#3d2f0a" stroke-width="1"/>
    <circle cx="-100" cy="0" r="5" fill="#d4af37"/>
    <text x="-85" y="5" font-family="'Inter', system-ui, sans-serif" font-size="15"
          fill="#a08030">Menús Digitales QR</text>
  </g>

  <!-- === Icono central decorativo (utensils) === -->
  <g transform="translate(540, 185)">
    <!-- Plato decorativo -->
    <circle cx="0" cy="0" r="54" fill="#1e1a12" fill-opacity="0.9" stroke="#d4af37" stroke-width="1.2" stroke-opacity="0.5"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="#d4af37" stroke-width="0.5" stroke-opacity="0.25"/>
    <text x="0" y="18" text-anchor="middle" font-size="42">🍽️</text>
  </g>

  <!-- === TÍTULO === -->
  <text x="540" y="348" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="68" fill="#f5f0e8" letter-spacing="-2">Tu menú digital,</text>
  <text x="540" y="430" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-weight="700" font-size="68" fill="url(#goldGrad)"
        filter="url(#glowText)" letter-spacing="-2">siempre listo.</text>

  <!-- Subtítulo -->
  <text x="540" y="500" text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif" font-size="24" fill="#7a6a40">
    Escanean el QR · Ven tu carta · Piden al instante
  </text>

  <!-- === CARDS de beneficios === -->
  <!-- Card 1 -->
  <g transform="translate(90, 555)">
    <rect width="260" height="130" rx="16" fill="url(#cardGrad)" stroke="#3d2f0a" stroke-width="1" stroke-opacity="0.8"/>
    <text x="30" y="52" font-size="30">📱</text>
    <text x="30" y="84" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="17" fill="#f5f0e8">Sin descargar apps</text>
    <text x="30" y="106" font-family="'Inter', system-ui, sans-serif"
          font-size="13" fill="#5c4e28">Abre en cualquier cel</text>
  </g>
  <!-- Card 2 -->
  <g transform="translate(410, 555)">
    <rect width="260" height="130" rx="16" fill="url(#cardGrad)" stroke="#3d2f0a" stroke-width="1" stroke-opacity="0.8"/>
    <text x="30" y="52" font-size="30">✏️</text>
    <text x="30" y="84" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="17" fill="#f5f0e8">Actualiza al instante</text>
    <text x="30" y="106" font-family="'Inter', system-ui, sans-serif"
          font-size="13" fill="#5c4e28">Sin reimprimir nada</text>
  </g>
  <!-- Card 3 -->
  <g transform="translate(730, 555)">
    <rect width="260" height="130" rx="16" fill="url(#cardGrad)" stroke="#3d2f0a" stroke-width="1" stroke-opacity="0.8"/>
    <text x="30" y="52" font-size="30">💰</text>
    <text x="30" y="84" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="17" fill="#f5f0e8">Ahorra en impresión</text>
    <text x="30" y="106" font-family="'Inter', system-ui, sans-serif"
          font-size="13" fill="#5c4e28">Amortiza desde el mes 1</text>
  </g>

  <!-- === Planes row === -->
  <g transform="translate(90, 730)">
    <!-- Esencial -->
    <rect width="265" height="75" rx="12" fill="url(#cardGrad)" stroke="#3d2f0a" stroke-width="1"/>
    <text x="20" y="28" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="14" fill="#a08030">ESENCIAL</text>
    <text x="20" y="55" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="26" fill="#f5f0e8">$3,999</text>
    <text x="200" y="55" font-family="'Inter', system-ui, sans-serif"
          font-size="12" fill="#5c4e28">pago único</text>
  </g>
  <g transform="translate(413, 718)">
    <!-- Pro (destacado) -->
    <rect width="265" height="90" rx="12" fill="url(#cardGrad)" stroke="#d4af37" stroke-width="1.5"/>
    <rect x="60" y="-13" width="145" height="26" rx="13" fill="url(#ctaGold)"/>
    <text x="132" y="4" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="12" fill="#0a0800">⭐ MÁS POPULAR</text>
    <text x="20" y="40" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="14" fill="#d4af37">PROFESIONAL</text>
    <text x="20" y="68" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="26" fill="#f5f0e8">$7,999</text>
    <text x="200" y="68" font-family="'Inter', system-ui, sans-serif"
          font-size="12" fill="#5c4e28">pago único</text>
  </g>
  <g transform="translate(737, 730)">
    <!-- Premium -->
    <rect width="253" height="75" rx="12" fill="url(#cardGrad)" stroke="#3d2f0a" stroke-width="1"/>
    <text x="20" y="28" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="600" font-size="14" fill="#f5d060">EMPRESARIAL</text>
    <text x="20" y="55" font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="26" fill="#f5f0e8">$14,999</text>
    <text x="200" y="55" font-family="'Inter', system-ui, sans-serif"
          font-size="12" fill="#5c4e28">multi-sucursal</text>
  </g>

  <!-- Línea divisora -->
  <rect x="90" y="830" width="900" height="1" fill="url(#goldGrad)" opacity="0.4"/>

  <!-- === CTA === -->
  <g transform="translate(540, 900)">
    <rect x="-200" y="-30" width="400" height="60" rx="30" fill="url(#ctaGold)"/>
    <rect x="-200" y="-30" width="400" height="60" rx="30" fill="url(#ctaGold)" filter="url(#blur2)" opacity="0.4"/>
    <text x="0" y="9" text-anchor="middle"
          font-family="'Space Grotesk', system-ui, sans-serif"
          font-weight="700" font-size="21" fill="#0a0800">🍽️ Ver demo de menú →</text>
  </g>

  <!-- URL footer -->
  <text x="540" y="990" text-anchor="middle"
        font-family="'Inter', system-ui" font-size="19" fill="#3d2f0a" letter-spacing="1">devifly.dev/menus-digitales</text>

  <!-- Esquinas ornamentales doradas -->
  <line x1="60" y1="1020" x2="160" y2="1020" stroke="#d4af37" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="60" y1="1020" x2="60" y2="980" stroke="#d4af37" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="920" y1="1020" x2="1020" y2="1020" stroke="#d4af37" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="1020" y1="1020" x2="1020" y2="980" stroke="#d4af37" stroke-width="1.5" stroke-opacity="0.4"/>
</svg>
